[build]
dockerfilePath = "Dockerfile"
watchPatterns = [
  "src/**",
  "pyproject.toml",
  "gunicorn_conf.py",
  "start.sh"
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
startCommand = "gunicorn src.api.main:app -c gunicorn_conf.py"
