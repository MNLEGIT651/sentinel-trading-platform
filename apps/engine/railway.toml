# Railway config for sentinel-engine service.
# In Railway dashboard the engine service "Root Directory" is "apps/engine".

[build]
dockerfilePath = "Dockerfile"
watchPatterns = [
  "apps/engine/**",
  "package.json",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
