# Railway config for sentinel-agents service
# This file lives at the repo root because the agents Dockerfile
# requires monorepo root as Docker build context (it COPYs workspace
# files like pnpm-lock.yaml and packages/shared/).
#
# IMPORTANT: In Railway dashboard, the sentinel-agents service
# "Root Directory" must be set to "/" (not "apps/agents/").

[build]
dockerfilePath = "apps/agents/Dockerfile"
watchPatterns = [
  "apps/agents/**",
  "packages/shared/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml"
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
startCommand = "node apps/agents/dist/index.js"
