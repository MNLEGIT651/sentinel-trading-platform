# Sentinel Trading Platform — Local development stack
# Usage: docker compose up --build
#
# Requires a .env file in the repo root with:
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, POLYGON_API_KEY, ANTHROPIC_API_KEY
#   ALPACA_API_KEY, ALPACA_SECRET_KEY

name: sentinel

services:
  # ── Quant Engine (Python FastAPI) ─────────────────────────────────────────
  engine:
    build:
      context: apps/engine
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/ready']
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - sentinel

  # ── Agent Orchestrator (TypeScript Express) ───────────────────────────────
  agents:
    build:
      context: .
      dockerfile: apps/agents/Dockerfile
    ports:
      - '3001:3001'
    env_file: .env
    environment:
      - ENGINE_URL=http://engine:8000
      - AGENTS_PORT=3001
      - WEB_URL=${WEB_URL:-http://localhost:3000}
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - sentinel

  # ── Next.js Dashboard ─────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      - ENGINE_URL=http://engine:8000
      - AGENTS_URL=http://agents:3001
    depends_on:
      engine:
        condition: service_healthy
      agents:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - sentinel

networks:
  sentinel:
    driver: bridge
