# Sentinel Trading Platform — Production-optimized stack
# Improvements: resource limits, build caching, health checks, restart policies
# Usage: docker compose up --build

name: sentinel

services:
  # ── Quant Engine (Python FastAPI) ─────────────────────────────────────────
  engine:
    build:
      context: apps/engine
      dockerfile: Dockerfile
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-4}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    networks:
      - sentinel
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ── Agent Orchestrator (TypeScript Express) ───────────────────────────────
  agents:
    build:
      context: .
      dockerfile: apps/agents/Dockerfile
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    ports:
      - '3001:3001'
    env_file: .env
    environment:
      - ENGINE_URL=http://engine:8000
      - AGENTS_PORT=3001
      - WEB_URL=${WEB_URL:-http://localhost:3000}
      - NODE_ENV=production
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - sentinel
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ── Next.js Dashboard ─────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      - ENGINE_URL=http://engine:8000
      - AGENTS_URL=http://agents:3001
      - NODE_ENV=production
    depends_on:
      engine:
        condition: service_healthy
      agents:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: on-failure:3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - sentinel
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

networks:
  sentinel:
    driver: bridge
