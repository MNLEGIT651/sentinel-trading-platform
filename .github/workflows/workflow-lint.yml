name: Workflow Lint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/check-required-workflows.mjs'
      - 'scripts/security-audit.mjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'scripts/check-required-workflows.mjs'
      - 'scripts/security-audit.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-workflows:
    name: Lint workflow controls
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - name: Check required workflows
        run: node scripts/check-required-workflows.mjs
