name: Routine — Morning Ops Commander

# Paired with Claude Code routine: morning-ops-commander
# Manifest: .claude/routines/manifest.yaml
# Spec:     .claude/routines/morning-ops-commander.md
#
# This workflow provides:
#   - A scheduled in-repo artifact capturing daily ops signals.
#   - A manual `workflow_dispatch` trigger for dry-run testing.
#   - An observable fallback for when the native Claude routine is disabled.

on:
  schedule:
    # 13:30 UTC / 08:30 US Central — matches the Claude routine schedule.
    - cron: '30 13 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not file issues, just emit report)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: read

concurrency:
  group: routine-morning-ops-commander
  cancel-in-progress: false

jobs:
  collect:
    name: Collect daily ops signals
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare report workspace
        id: prep
        run: |
          mkdir -p reports/routines
          REPORT_DATE="$(date -u +%Y-%m-%d)"
          REPORT_FILE="reports/routines/morning-ops-${REPORT_DATE}.md"
          echo "report_date=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "report_file=${REPORT_FILE}" >> "$GITHUB_OUTPUT"

      - name: Validate manifest and spec are in sync
        run: node scripts/routines/verify-routine-sync.mjs --only morning-ops-commander

      - name: Collect CI health
        id: ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --repo "${{ github.repository }}" --limit 10 \
            --json status,conclusion,name,createdAt,headBranch,event \
            > reports/routines/ci-runs.json

      - name: Collect open PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr list --repo "${{ github.repository }}" --state open \
            --json number,title,author,createdAt,updatedAt,reviewDecision,isDraft,labels,headRefName,mergeable \
            > reports/routines/prs.json

      - name: Collect open issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --repo "${{ github.repository }}" --state open --limit 200 \
            --json number,title,labels,createdAt,updatedAt,assignees \
            > reports/routines/issues.json

      - name: Collect Dependabot alerts (best effort)
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          gh api "repos/${{ github.repository }}/dependabot/alerts" \
            --jq '[.[] | select(.state=="open")]' \
            > reports/routines/dependabot.json || echo '[]' > reports/routines/dependabot.json

      - name: Collect branches (non-default)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/branches?per_page=100" \
            --jq '[.[] | {name: .name, protected: .protected}]' \
            > reports/routines/branches.json

      - name: Collect recent deployments (best effort)
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          gh api "repos/${{ github.repository }}/deployments?per_page=10" \
            > reports/routines/deployments.json || echo '[]' > reports/routines/deployments.json

      - name: Render report skeleton
        env:
          REPORT_DATE: ${{ steps.prep.outputs.report_date }}
          REPORT_FILE: ${{ steps.prep.outputs.report_file }}
        run: |
          OPEN_PRS=$(jq 'length' reports/routines/prs.json)
          OPEN_ISSUES=$(jq 'length' reports/routines/issues.json)
          OPEN_ALERTS=$(jq 'length' reports/routines/dependabot.json)
          FAILED_RUNS=$(jq '[.[] | select(.conclusion=="failure")] | length' reports/routines/ci-runs.json)

          {
            echo "# [ops] Morning Ops Report — ${REPORT_DATE}"
            echo ""
            echo "> Generated by the paired GitHub Action for routine \`morning-ops-commander\`."
            echo "> Native Claude Code routine (if active) will post the rated version."
            echo ""
            echo "## Raw signals"
            echo ""
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| Failed CI runs (last 10) | ${FAILED_RUNS} |"
            echo "| Open PRs | ${OPEN_PRS} |"
            echo "| Open issues | ${OPEN_ISSUES} |"
            echo "| Open Dependabot alerts | ${OPEN_ALERTS} |"
            echo ""
            echo "Payload artifacts: see workflow run artifact \`morning-ops-report-${GITHUB_RUN_ID}\`."
          } > "${REPORT_FILE}"

          cat "${REPORT_FILE}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifact
        uses: actions/upload-artifact@89ef406dd8d7e03cfd12d9e0a4a378f454709029 # v5.0.0
        with:
          name: morning-ops-report-${{ github.run_id }}
          path: reports/routines/
          retention-days: 14

      - name: Guard — dry-run default
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            # Scheduled runs default to dry-run. Native Claude routine is the
            # primary issue filer. Flip by configuring a repo variable.
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: File/refresh ops report issue (when dry_run=false)
        if: steps.guard.outputs.dry_run == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT_DATE: ${{ steps.prep.outputs.report_date }}
          REPORT_FILE: ${{ steps.prep.outputs.report_file }}
        run: |
          TITLE="[ops] Morning Ops Report — ${REPORT_DATE}"
          EXISTING=$(gh issue list --repo "${{ github.repository }}" \
            --search "in:title \"${TITLE}\"" --state all --limit 1 --json number --jq '.[0].number' || echo '')
          if [ -n "${EXISTING}" ]; then
            gh issue comment "${EXISTING}" --repo "${{ github.repository }}" --body-file "${REPORT_FILE}"
          else
            gh issue create --repo "${{ github.repository }}" \
              --title "${TITLE}" \
              --label "ops,report" \
              --body-file "${REPORT_FILE}"
          fi
