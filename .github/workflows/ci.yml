name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Next.js web app
  # ---------------------------------------------------------------------------
  test-web:
    name: Test Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web tests
        run: pnpm --filter web test

      - name: Build web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key

  # ---------------------------------------------------------------------------
  # Job 2: Python quant engine
  # ---------------------------------------------------------------------------
  test-engine:
    name: Test Engine
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache uv / pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('apps/engine/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install uv
        run: pip install uv

      - name: Create venv and install engine dependencies
        working-directory: apps/engine
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Run engine tests
        working-directory: apps/engine
        run: .venv/bin/python -m pytest tests --tb=short
        env:
          PYTHONDONTWRITEBYTECODE: '1'

  # ---------------------------------------------------------------------------
  # Job 3: Agents TypeScript service
  # ---------------------------------------------------------------------------
  test-agents:
    name: Test Agents
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run agents tests
        run: pnpm --filter agents test

  # ---------------------------------------------------------------------------
  # Job 4: Secrets scanning
  # ---------------------------------------------------------------------------
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 5: Deploy web app to Vercel (main branch only)
  # Requires GitHub secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
  # Add these in: GitHub repo → Settings → Secrets and variables → Actions
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    needs: [test-web, test-engine, test-agents, secrets-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Deploy to Vercel (production)
        run: |
          pnpm dlx vercel --token ${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes \
            --cwd apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ---------------------------------------------------------------------------
  # Job 6: Validate Supabase migrations against a local Supabase instance
  # ---------------------------------------------------------------------------
  validate-migrations:
    name: Validate DB Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Initialize Supabase config
        run: supabase init
      - name: Start local Supabase
        run: supabase start
      - name: Apply migrations (supabase db reset replays all migrations from scratch)
        run: supabase db reset
      - name: Stop local Supabase
        run: supabase stop
