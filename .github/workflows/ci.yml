name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: Commit signature policy gate
  # ---------------------------------------------------------------------------
  verify-commit-signatures:
    name: Verify Commit Signatures
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
        (github.base_ref == 'main' || startsWith(github.base_ref, 'release/')))
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify signatures in commit range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            RANGE="${{ github.sha }}"
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          fi

          echo "Using commit range: $RANGE"
          scripts/check-commit-signatures.sh "$RANGE"

  # ---------------------------------------------------------------------------
  # Job 1: Next.js web app
  # ---------------------------------------------------------------------------
  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('apps/web/package.json', 'apps/web/next.config.*', 'apps/web/tsconfig.json', 'apps/web/postcss.config.*') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Run monorepo lint
        run: pnpm lint

      - name: Run web tests
        run: pnpm --filter web test

      - name: Build web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder-publishable-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Report bundle size
        run: |
          echo "### 📦 Bundle Size Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f apps/web/.next/BUILD_ID ]; then
            echo "**Build ID:** $(cat apps/web/.next/BUILD_ID)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # Parse route manifest for sizes
          if [ -f apps/web/.next/routes-manifest.json ]; then
            echo "Static routes: $(jq '.staticRoutes | length' apps/web/.next/routes-manifest.json)"
            echo "Dynamic routes: $(jq '.dynamicRoutes | length' apps/web/.next/routes-manifest.json)"
          fi >> "$GITHUB_STEP_SUMMARY"
          # Report JS chunk sizes
          if [ -d apps/web/.next/static/chunks ]; then
            total=$(du -sh apps/web/.next/static/chunks 2>/dev/null | cut -f1)
            echo "Total JS chunks: $total"
            echo ""
            echo "Top 10 largest chunks:"
            find apps/web/.next/static/chunks -name '*.js' -exec du -h {} + 2>/dev/null | sort -rh | head -10
          fi >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Job 2: Python quant engine
  # ---------------------------------------------------------------------------
  test-engine:
    name: Test Engine
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: '.python-version'

      - name: Cache uv / pip
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('apps/engine/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install uv
        run: pip install uv

      - name: Create venv and install engine dependencies
        working-directory: apps/engine
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Run Ruff lint
        working-directory: apps/engine
        run: .venv/bin/python -m ruff check src tests

      - name: Run Ruff format check
        working-directory: apps/engine
        run: .venv/bin/python -m ruff format --check src tests

      - name: Run engine tests
        working-directory: apps/engine
        run: .venv/bin/python -m pytest tests --tb=short
        env:
          PYTHONDONTWRITEBYTECODE: '1'

  # ---------------------------------------------------------------------------
  # Job 3: Agents TypeScript service
  # ---------------------------------------------------------------------------
  test-agents:
    name: Test Agents
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check agents
        run: pnpm --filter agents build

      - name: Run agents tests
        run: pnpm --filter agents test

  # ---------------------------------------------------------------------------
  # Job 4: Dependency vulnerability scanning
  # ---------------------------------------------------------------------------
  security-audit:
    name: Security Audit
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
        (github.base_ref == 'main' || startsWith(github.base_ref, 'release/')))
    needs: [verify-commit-signatures, test-web, test-engine, test-agents]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: '.python-version'

      - name: Install uv
        run: pip install uv

      - name: Create venv and install engine audit dependencies
        working-directory: apps/engine
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"
          uv pip install --python .venv/bin/python pip-audit

      - name: Run repository security audit
        run: node scripts/security-audit.mjs
