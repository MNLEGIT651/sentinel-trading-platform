name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Next.js web app
  # ---------------------------------------------------------------------------
  test-web:
    name: Test Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web tests
        run: pnpm --filter web test

      - name: Build web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key

  # ---------------------------------------------------------------------------
  # Job 2: Python quant engine
  # ---------------------------------------------------------------------------
  test-engine:
    name: Test Engine
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache uv / pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('apps/engine/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install uv
        run: pip install uv

      - name: Create venv and install engine dependencies
        working-directory: apps/engine
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Run engine tests
        working-directory: apps/engine
        run: .venv/bin/python -m pytest tests --tb=short
        env:
          PYTHONDONTWRITEBYTECODE: '1'

  # ---------------------------------------------------------------------------
  # Job 3: Agents TypeScript service
  # ---------------------------------------------------------------------------
  test-agents:
    name: Test Agents
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run agents tests
        run: pnpm --filter agents test
