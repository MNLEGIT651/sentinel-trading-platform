name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: Detect which apps changed — skip irrelevant jobs on PRs
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      web: ${{ steps.filter.outputs.web }}
      engine: ${{ steps.filter.outputs.engine }}
      agents: ${{ steps.filter.outputs.agents }}
      shared: ${{ steps.filter.outputs.shared }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
            engine:
              - 'apps/engine/**'
            agents:
              - 'apps/agents/**'
              - 'packages/shared/**'
            shared:
              - 'packages/shared/**'
            infra:
              - '.github/**'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'tsconfig.base.json'

  # ---------------------------------------------------------------------------
  # Job 1: Commit signature policy gate
  # ---------------------------------------------------------------------------
  verify-commit-signatures:
    name: Verify Commit Signatures
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
        (github.base_ref == 'main' || startsWith(github.base_ref, 'release/')))
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify signatures in commit range
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            RANGE="${{ github.sha }}"
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
          fi

          echo "Using commit range: $RANGE"
          scripts/check-commit-signatures.sh "$RANGE"

  # ---------------------------------------------------------------------------
  # Job 2: Lint all TypeScript workspaces (single job, leverages Turbo cache)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.agents == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Lint all workspaces
        run: pnpm lint

      - name: Run env contract tests
        run: pnpm test:scripts

  # ---------------------------------------------------------------------------
  # Job 3: Next.js web app — test + build
  # ---------------------------------------------------------------------------
  test-web:
    name: Test Web
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Cache Next.js build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('apps/web/package.json', 'apps/web/next.config.*', 'apps/web/tsconfig.json', 'apps/web/postcss.config.*') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Run web tests
        run: pnpm --filter web test

      - name: Build web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder-publishable-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Report bundle size
        run: |
          {
            echo "### 📦 Bundle Size Report"
            echo ""
            if [ -f apps/web/.next/BUILD_ID ]; then
              echo "**Build ID:** $(cat apps/web/.next/BUILD_ID)"
            fi
            echo ""
            echo '```'
            if [ -f apps/web/.next/routes-manifest.json ]; then
              echo "Static routes: $(jq '.staticRoutes | length' apps/web/.next/routes-manifest.json)"
              echo "Dynamic routes: $(jq '.dynamicRoutes | length' apps/web/.next/routes-manifest.json)"
            fi
            if [ -d apps/web/.next/static/chunks ]; then
              total=$(du -sh apps/web/.next/static/chunks 2>/dev/null | cut -f1)
              echo "Total JS chunks: $total"
              echo ""
              echo "Top 10 largest chunks:"
              find apps/web/.next/static/chunks -name '*.js' -exec du -h {} + 2>/dev/null | sort -rh | head -10
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Job 4: Python quant engine
  # ---------------------------------------------------------------------------
  test-engine:
    name: Test Engine
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.engine == 'true' ||
      needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: '.python-version'

      - name: Setup uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.3.1
        with:
          enable-cache: true
          cache-dependency-glob: 'apps/engine/pyproject.toml'

      - name: Create venv and install engine dependencies
        working-directory: apps/engine
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Run Ruff lint
        working-directory: apps/engine
        run: .venv/bin/python -m ruff check src tests

      - name: Run Ruff format check
        working-directory: apps/engine
        run: .venv/bin/python -m ruff format --check src tests

      - name: Run engine tests
        working-directory: apps/engine
        run: .venv/bin/python -m pytest tests --tb=short
        env:
          PYTHONDONTWRITEBYTECODE: '1'

  # ---------------------------------------------------------------------------
  # Job 5: Agents TypeScript service
  # ---------------------------------------------------------------------------
  test-agents:
    name: Test Agents
    needs: changes
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.agents == 'true' ||
      needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node & pnpm
        uses: ./.github/actions/setup-node-pnpm

      # Build first (produces dist/), then lint ESLint only (skip redundant tsc)
      - name: Build agents
        run: pnpm --filter agents build

      - name: Lint agents (ESLint only)
        run: pnpm --filter agents lint:eslint

      - name: Run agents tests
        run: pnpm --filter agents test

  # ---------------------------------------------------------------------------
  # Job 6: Dependency vulnerability scanning
  # ---------------------------------------------------------------------------
  security-audit:
    name: Security Audit
    # Run after all test jobs complete (skipped deps are OK, failures are not).
    needs: [verify-commit-signatures, lint, test-web, test-engine, test-agents]
    if: >-
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' &&
          (github.base_ref == 'main' || startsWith(github.base_ref, 'release/')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: '.python-version'

      - name: Setup uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.3.1
        with:
          enable-cache: true
          cache-dependency-glob: 'apps/engine/pyproject.toml'

      - name: Create venv and install engine audit dependencies
        working-directory: apps/engine
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"
          uv pip install --python .venv/bin/python pip-audit

      - name: Run repository security audit
        run: node scripts/security-audit.mjs
