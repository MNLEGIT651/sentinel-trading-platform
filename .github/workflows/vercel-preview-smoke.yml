name: Vercel Preview Smoke

on:
  deployment_status:

permissions:
  contents: read

concurrency:
  group: vercel-preview-smoke-${{ github.event.deployment_status.deployment.environment }}-${{ github.event.deployment_status.id }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event.deployment_status.state == 'success' && contains(github.event.deployment.environment, 'Preview')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Derive preview URL
        id: derive
        run: |
          url="${{ github.event.deployment_status.environment_url }}"
          if [[ -z "${url}" ]]; then
            url="${{ github.event.deployment_status.target_url }}"
          fi
          if [[ -z "${url}" ]]; then
            echo "::error::Unable to determine deployment URL from event payload."
            exit 1
          fi
          url="${url%/}"
          echo "base=${url}" >> "$GITHUB_OUTPUT"
          echo "Preview URL: ${url}"

      - name: Probe health endpoints
        env:
          BASE_URL: ${{ steps.derive.outputs.base }}
        run: |
          set -euo pipefail
          paths=(
            "/api/health"
            "/api/engine/health"
            "/api/agents/health"
            "/api/settings/status"
          )
          for path in "${paths[@]}"; do
            full="${BASE_URL}${path}"
            echo "Probing ${full}"
            if ! curl -f --retry 2 --retry-delay 2 --max-time 10 -sS "$full" >/tmp/smoke.out; then
              echo "::error::${path} failed"
              exit 1
            fi
          done
          echo "All preview smoke checks passed."
