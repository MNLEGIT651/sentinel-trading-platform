name: Vercel Preview Smoke

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/vercel-preview-smoke.yml'
      - 'scripts/health-check.sh'
      - 'scripts/smoke-test.sh'
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/vercel-preview-smoke.yml'
      - 'scripts/health-check.sh'
      - 'scripts/smoke-test.sh'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-preview-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Synthetic Proxy Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve target URL secret
        id: target
        env:
          VERCEL_PREVIEW_SMOKE_URL: ${{ secrets.VERCEL_PREVIEW_SMOKE_URL }}
        run: |
          if [ -z "$VERCEL_PREVIEW_SMOKE_URL" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing required secret: VERCEL_PREVIEW_SMOKE_URL. Skipping preview smoke checks."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run health checks
        if: steps.target.outputs.available == 'true'
        env:
          VERCEL_URL: ${{ secrets.VERCEL_PREVIEW_SMOKE_URL }}
        run: |
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh --verbose

      - name: Run smoke tests
        if: steps.target.outputs.available == 'true'
        env:
          VERCEL_URL: ${{ secrets.VERCEL_PREVIEW_SMOKE_URL }}
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh --verbose
