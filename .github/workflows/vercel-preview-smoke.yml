name: Vercel Preview Smoke

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/vercel-preview-smoke.yml'
      - 'scripts/health-check.sh'
      - 'scripts/resolve-vercel-deployment-url.sh'
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/vercel-preview-smoke.yml'
      - 'scripts/health-check.sh'
      - 'scripts/resolve-vercel-deployment-url.sh'
  workflow_dispatch:

permissions:
  contents: read
  deployments: read

concurrency:
  group: vercel-preview-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Synthetic Proxy Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve Vercel deployment URL
        id: target
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          ENVIRONMENT: ${{ github.event_name == 'pull_request' && 'Preview' || 'Production' }}
        run: |
          set -euo pipefail

          tmpfile=$(mktemp)
          trap 'rm -f "$tmpfile"' EXIT

          # Fail loudly if the resolver itself exits non-zero (e.g. missing GITHUB_TOKEN,
          # jq not found, etc.) rather than silently continuing with an empty result set.
          if ! ./scripts/resolve-vercel-deployment-url.sh \
            --repo "$REPO" \
            --sha "$SHA" \
            --environment "$ENVIRONMENT" \
            --attempts 20 \
            --sleep-seconds 15 > "$tmpfile"; then
            echo "::error::Deployment URL resolver exited non-zero — check the script output above."
            exit 1
          fi

          mapfile -t resolved < "$tmpfile"

          for line in "${resolved[@]}"; do
            echo "$line" >> "$GITHUB_OUTPUT"
          done

          available=$(printf '%s\n' "${resolved[@]}" | awk -F= '$1=="available"{print $2}')
          state=$(printf '%s\n' "${resolved[@]}" | awk -F= '$1=="state"{print $2}')
          url=$(printf '%s\n' "${resolved[@]}" | awk -F= '$1=="url"{print $2}')
          deployment_id=$(printf '%s\n' "${resolved[@]}" | awk -F= '$1=="deployment_id"{print $2}')

          if [[ "$available" == "true" ]]; then
            echo "Resolved $ENVIRONMENT deployment ${deployment_id:-unknown}: $url"
            exit 0
          fi

          if [[ "$ENVIRONMENT" == "Preview" ]]; then
            if [[ "$state" == "inactive" ]]; then
              echo "::warning::Preview deployment is inactive/skipped (likely ignoreCommand). Skipping smoke."
              exit 0
            elif [[ "$state" == "api_error" ]]; then
              echo "::error::GitHub API error while resolving preview deployment. Cannot proceed."
              exit 1
            elif [[ "$state" == "failure" || "$state" == "error" ]]; then
              echo "::error::Preview deployment failed before smoke (deployment ${deployment_id:-unknown}, state=${state}). Marking check as failed."
              exit 1
            else
              echo "::warning::No successful preview deployment resolved for sha $SHA (state=${state:-not_found}). Skipping smoke."
              exit 0
            fi
          fi

          # Push to main: only fall back to canonical production alias when the
          # deployment simply wasn't found yet (API lag) or was inactive (ignoreCommand).
          # An explicit failure/error means the production deploy itself broke — do NOT
          # mask that by probing the stale previous alias.
          if [[ "$state" == "failure" || "$state" == "error" ]]; then
            echo "::error::Production deployment explicitly failed (state=${state}, deployment ${deployment_id:-unknown}). Not falling back to alias — this is a real regression."
            exit 1
          fi

          if [[ "$state" == "api_error" ]]; then
            echo "::error::GitHub API error while resolving production deployment. Cannot proceed."
            exit 1
          fi

          echo "::warning::No successful production deployment resolved for sha $SHA (state=${state:-not_found}). Falling back to canonical alias."
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "url=https://sentinel-trading-platform.vercel.app" >> "$GITHUB_OUTPUT"

      - name: Run synthetic proxy health checks
        if: steps.target.outputs.available == 'true'
        env:
          VERCEL_URL: ${{ steps.target.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: ./scripts/health-check.sh --verbose
