name: Test Coverage

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Coverage for Node/TypeScript workspaces
  # ---------------------------------------------------------------------------
  coverage-node:
    name: Node Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web tests with coverage
        run: pnpm --filter web test -- --coverage --reporter=json --reporter=default
        continue-on-error: true

      - name: Run agents tests with coverage
        run: pnpm --filter agents test -- --coverage --reporter=json --reporter=default
        continue-on-error: true

      - name: Generate coverage summary
        if: always()
        run: |
          {
            echo "## Test Coverage Report"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f apps/web/coverage/coverage-summary.json ]; then
            {
              echo "### Web App Coverage"
              node -e "
                const coverage = require('./apps/web/coverage/coverage-summary.json');
                const total = coverage.total;
                console.log('| Metric | Coverage |');
                console.log('|--------|----------|');
                console.log(\`| Lines | \${total.lines.pct}% |\`);
                console.log(\`| Statements | \${total.statements.pct}% |\`);
                console.log(\`| Functions | \${total.functions.pct}% |\`);
                console.log(\`| Branches | \${total.branches.pct}% |\`);
              "
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f apps/agents/coverage/coverage-summary.json ]; then
            {
              echo "### Agents App Coverage"
              node -e "
                const coverage = require('./apps/agents/coverage/coverage-summary.json');
                const total = coverage.total;
                console.log('| Metric | Coverage |');
                console.log('|--------|----------|');
                console.log(\`| Lines | \${total.lines.pct}% |\`);
                console.log(\`| Statements | \${total.statements.pct}% |\`);
                console.log(\`| Functions | \${total.functions.pct}% |\`);
                console.log(\`| Branches | \${total.branches.pct}% |\`);
              "
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  # ---------------------------------------------------------------------------
  # Coverage for Python engine
  # ---------------------------------------------------------------------------
  coverage-python:
    name: Python Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache uv / pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('apps/engine/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install uv
        run: pip install uv

      - name: Create venv and install engine dependencies
        working-directory: apps/engine
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"
          uv pip install --python .venv/bin/python pytest-cov

      - name: Run engine tests with coverage
        working-directory: apps/engine
        run: |
          .venv/bin/python -m pytest tests \
            --cov=src \
            --cov-report=term \
            --cov-report=json \
            --cov-report=html \
            --tb=short
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        continue-on-error: true

      - name: Generate coverage summary
        if: always()
        working-directory: apps/engine
        run: |
          if [ -f coverage.json ]; then
            echo "### Engine Coverage" >> "$GITHUB_STEP_SUMMARY"
            .venv/bin/python -c "
          import json
          with open('coverage.json') as f:
              data = json.load(f)
              total = data['totals']
              print('| Metric | Coverage |')
              print('|--------|----------|')
              print(f\"| Lines | {total['percent_covered']:.1f}% |\")
              print(f\"| Statements | {total['covered_lines']}/{total['num_statements']} |\")
          " >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-coverage-report
          path: apps/engine/htmlcov/
          retention-days: 14
