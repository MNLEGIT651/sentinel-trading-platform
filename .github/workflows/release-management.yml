name: Release Management

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.2.3)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: read
  issues: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Optional: set TURBO_TOKEN + TURBO_TEAM in repo secrets for Turborepo Remote Cache.
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
            PRERELEASE="false"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION} (prerelease: ${PRERELEASE})"

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full test suite
        run: |
          pnpm lint
          pnpm test

      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Cache uv / pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('apps/engine/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install uv
        run: pip install uv==0.11.5

      - name: Create venv and install engine dependencies
        working-directory: apps/engine
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Run engine tests
        working-directory: apps/engine
        run: |
          .venv/bin/python -m ruff check src tests
          .venv/bin/python -m ruff format --check src tests
          .venv/bin/python -m pytest tests --tb=short
        env:
          PYTHONDONTWRITEBYTECODE: '1'

      - name: Build all apps
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder-publishable-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key

  create-release:
    name: Create Release
    needs: validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "## Changes" > changelog.md
            git log --pretty=format:"- %s (%h)" >> changelog.md
          else
            echo "## Changes since ${PREVIOUS_TAG}" > changelog.md
            git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" >> changelog.md
          fi

          {
            echo ""
            echo "## Validation"
            echo "- ✅ All tests passing"
            echo "- ✅ All linters passing"
            echo "- ✅ All builds successful"
          } >> changelog.md

          cat changelog.md

      - name: Install Syft (pinned + checksum verified)
        run: |
          set -euo pipefail
          SYFT_VERSION="v1.31.0"
          ARCHIVE="syft_${SYFT_VERSION#v}_linux_amd64.tar.gz"
          BASE_URL="https://github.com/anchore/syft/releases/download/${SYFT_VERSION}"
          curl -sSfL "${BASE_URL}/${ARCHIVE}" -o "/tmp/${ARCHIVE}"
          curl -sSfL "${BASE_URL}/syft_${SYFT_VERSION#v}_checksums.txt" -o /tmp/syft_checksums.txt
          grep " ${ARCHIVE}$" /tmp/syft_checksums.txt | sha256sum -c -
          tar -xzf "/tmp/${ARCHIVE}" -C /tmp syft
          install -m 0755 /tmp/syft /usr/local/bin/syft

      - name: Generate CycloneDX SBOM
        run: syft scan dir:. -o cyclonedx-json=sbom.cdx.json

      - name: Generate SPDX SBOM
        run: syft scan dir:. -o spdx-json=sbom.spdx.json

      # softprops/action-gh-release replaces the deprecated actions/create-release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ needs.validate-release.outputs.version }}
          name: Release ${{ needs.validate-release.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: ${{ needs.validate-release.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            sbom.cdx.json
            sbom.spdx.json

      - name: Write release summary
        run: |
          {
            echo "## Release ${{ needs.validate-release.outputs.version }}"
            echo ""
            echo "✅ Release created successfully"
            echo ""
            echo "- Version: ${{ needs.validate-release.outputs.version }}"
            echo "- Pre-release: ${{ needs.validate-release.outputs.prerelease }}"
            echo "- All validation checks passed"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-deployment:
    name: Notify Deployment
    needs: [validate-release, create-release]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger deployment notification
        run: |
          echo "Release ${{ needs.validate-release.outputs.version }} is ready for deployment"
          echo "Follow deployment runbooks in docs/runbooks/ for next steps"
