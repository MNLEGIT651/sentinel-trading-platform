name: Stale Issue and PR Management

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: stale-management
  cancel-in-progress: false

jobs:
  stale:
    name: Close Stale Issues and PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Mark and close stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issue configuration
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.

            It will be closed in 7 days if no further activity occurs.

            If this issue is still relevant, please:
            - Add a comment to keep it open
            - Add the `pinned` label to prevent auto-closure
            - Update the issue with current status or context

            Thank you for your contributions to the Sentinel Trading Platform!

          close-issue-message: |
            This issue has been automatically closed due to inactivity.

            If you believe this issue should remain open, please reopen it and provide an update.

          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,critical,roadmap,in-progress'

          # PR configuration
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity.

            It will be closed in 14 days if no further activity occurs.

            If this PR is still relevant, please:
            - Rebase on the latest main branch
            - Resolve any merge conflicts
            - Update the PR description with current status
            - Request a review
            - Add the `pinned` label to prevent auto-closure

            Thank you for your contributions!

          close-pr-message: |
            This pull request has been automatically closed due to inactivity.

            If you would like to continue this work, please:
            - Reopen the PR
            - Rebase on the latest main branch
            - Update the PR description
            - Request a review

          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,critical,work-in-progress,blocked'

          # General configuration
          operations-per-run: 100
          remove-stale-when-updated: true
          ascending: false
          exempt-milestones: true
          exempt-all-milestones: false

          # Only process items with no activity (comments, commits, reviews, etc.)
          exempt-draft-pr: true
          ignore-updates: false
