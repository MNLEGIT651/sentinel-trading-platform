name: Vercel Deployment Checks

on:
  repository_dispatch:
    types:
      - vercel.deployment.success
  workflow_dispatch:
    inputs:
      deployment_url:
        description: Deployment URL or hostname to verify
        required: true
        type: string
      environment:
        description: Expected environment label
        required: false
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: vercel-deployment-checks-${{ github.event.client_payload.url || inputs.deployment_url || github.run_id }}
  cancel-in-progress: true

jobs:
  verify-deployment:
    name: Verify Deployment Health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DEPLOYMENT_URL: ${{ github.event.client_payload.url || inputs.deployment_url }}
      EXPECTED_ENVIRONMENT: ${{ github.event.client_payload.environment || inputs.environment || 'preview' }}

    steps:
      - name: Normalize deployment URL
        id: normalize
        shell: bash
        run: |
          set -euo pipefail
          url="${DEPLOYMENT_URL}"
          if [[ -z "${url}" ]]; then
            echo "Deployment URL is required." >&2
            exit 1
          fi
          if [[ "${url}" != http://* && "${url}" != https://* ]]; then
            url="https://${url}"
          fi
          echo "base_url=${url%/}" >> "$GITHUB_OUTPUT"

      - name: Check /api/health
        env:
          BASE_URL: ${{ steps.normalize.outputs.base_url }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent "${BASE_URL}/api/health" > health.json
          cat health.json

      - name: Check /api/settings/status
        env:
          BASE_URL: ${{ steps.normalize.outputs.base_url }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent "${BASE_URL}/api/settings/status" > status.json
          cat status.json

      - name: Assert deployment readiness
        env:
          BASE_URL: ${{ steps.normalize.outputs.base_url }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');

          const baseUrl = process.env.BASE_URL;
          const expectedEnvironment = process.env.EXPECTED_ENVIRONMENT || 'preview';
          const health = JSON.parse(fs.readFileSync('health.json', 'utf8'));
          const status = JSON.parse(fs.readFileSync('status.json', 'utf8'));

          if (health.status !== 'ok') {
            throw new Error(`Expected health.status="ok" from ${baseUrl}, received ${health.status ?? 'undefined'}`);
          }

          const requiredServices = ['engine', 'agents'];
          for (const service of requiredServices) {
            if (status[service] !== 'connected') {
              throw new Error(`Expected ${service} to be connected for ${expectedEnvironment} deployment ${baseUrl}, received ${status[service] ?? 'undefined'}`);
            }
          }

          const strictDependencies = ['polygon', 'supabase', 'anthropic', 'alpaca'];
          if (expectedEnvironment === 'production') {
            for (const dependency of strictDependencies) {
              if (status[dependency] !== 'connected') {
                throw new Error(`Expected ${dependency} to be connected for production deployment ${baseUrl}, received ${status[dependency] ?? 'undefined'}`);
              }
            }
          } else {
            const degraded = strictDependencies.filter(
              (dependency) => status[dependency] !== 'connected',
            );
            if (degraded.length > 0) {
              console.warn(
                `Preview dependency warning for ${baseUrl}: ${degraded.join(', ')} are not fully connected.`,
              );
            }
          }
          NODE

      - name: Write workflow summary
        env:
          BASE_URL: ${{ steps.normalize.outputs.base_url }}
        shell: bash
        run: |
          {
            echo "### Verified deployment"
            echo
            echo "- URL: ${BASE_URL}"
            echo "- Environment: ${EXPECTED_ENVIRONMENT}"
            echo "- Checks: \`/api/health\`, \`/api/settings/status\`"
          } >> "$GITHUB_STEP_SUMMARY"
