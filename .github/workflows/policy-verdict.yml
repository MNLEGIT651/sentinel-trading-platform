name: Policy Verdict

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled, edited]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: policy-verdict-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  Policy-Verdict:
    name: Policy Verdict
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request != null
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - name: Collect pull request files and labels
        if: github.event.pull_request != null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[].filename' > changed-files.txt
          jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" > pr-labels.txt

      - name: Collect default inputs for manual dispatch
        if: github.event.pull_request == null
        run: |
          git ls-files > changed-files.txt
          : > pr-labels.txt

      - name: Generate policy verdict
        id: verdict
        run: |
          set +e
          node scripts/control-plane-policy.mjs \
            --files-file changed-files.txt \
            --labels-file pr-labels.txt \
            --actor "${{ github.actor }}" \
            --json-out policy-verdict.json \
            --summary-out policy-verdict.md > policy-verdict.stdout.json
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Sync managed pull request labels
        if: github.event.pull_request != null
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs');
            const verdict = JSON.parse(fs.readFileSync('policy-verdict.json', 'utf8'));
            const managedPrefixes = ['risk/', 'area/', 'decision/'];
            const currentLabels = context.payload.pull_request.labels.map((label) => label.name);
            const preserved = currentLabels.filter(
              (name) => !managedPrefixes.some((prefix) => name.startsWith(prefix)),
            );
            const labels = [...new Set([...preserved, ...verdict.labels])];

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels,
            });

      - name: Append policy summary
        run: cat policy-verdict.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload policy verdict artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: policy-verdict
          path: |
            policy-verdict.json
            policy-verdict.md

      - name: Enforce merge gate
        run: |
          if [ "${{ steps.verdict.outputs.exit_code }}" -ne 0 ]; then
            echo "Policy verdict blocked merge."
            exit 1
          fi
