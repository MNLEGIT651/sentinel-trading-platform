name: Performance Benchmarks

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1' # Weekly on Mondays at 2 AM UTC

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: benchmarks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Web app performance (Lighthouse CI)
  # ---------------------------------------------------------------------------
  web-performance:
    name: Web Performance
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key

      - name: Run Lighthouse CI
        id: lighthouse
        run: |
          cd apps/web
          npx @lhci/cli@0.13.x autorun --collect.startServerCommand="pnpm start" --collect.url="http://localhost:3000" 2>&1 || {
            exit_code=$?
            echo "::warning::Lighthouse CI exited with code $exit_code — scores may be below thresholds or config missing"
            echo "lighthouse_failed=true" >> "$GITHUB_OUTPUT"
          }

      - name: Generate performance summary
        if: always()
        run: |
          {
            echo "## Web Performance Report"
            echo ""
            echo "Lighthouse CI analysis completed. Check artifacts for detailed report."
            echo ""
            echo "### Key Metrics"
            echo "- First Contentful Paint (FCP)"
            echo "- Largest Contentful Paint (LCP)"
            echo "- Total Blocking Time (TBT)"
            echo "- Cumulative Layout Shift (CLS)"
            echo "- Speed Index"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Engine API performance
  # ---------------------------------------------------------------------------
  engine-performance:
    name: Engine Performance
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache uv / pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('apps/engine/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install uv
        run: pip install uv

      - name: Create venv and install engine dependencies
        working-directory: apps/engine
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"
          uv pip install --python .venv/bin/python pytest-benchmark

      - name: Run performance benchmarks
        working-directory: apps/engine
        run: |
          .venv/bin/python -m pytest tests/ -k "benchmark" --benchmark-only --benchmark-json=benchmark.json 2>&1 || {
            exit_code=$?
            if [ $exit_code -eq 5 ]; then
              echo "::notice::No benchmark tests found (pytest exit code 5) — skipping"
            else
              echo "::warning::Benchmark suite exited with code $exit_code"
            fi
          }
        env:
          PYTHONDONTWRITEBYTECODE: '1'

      - name: Generate benchmark summary
        if: always()
        working-directory: apps/engine
        run: |
          {
            echo "## Engine Performance Benchmarks"
            echo ""
            if [ -f benchmark.json ]; then
              echo "✅ Benchmark results available in artifacts"
              echo ""
              echo "### Benchmark Categories"
              echo "- Market data processing"
              echo "- Strategy calculations"
              echo "- Risk calculations"
              echo "- Order validation"
            else
              echo "ℹ️ No benchmark results — benchmark tests not yet written"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-benchmarks
          path: apps/engine/benchmark.json
          retention-days: 90
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Agents performance
  # ---------------------------------------------------------------------------
  agents-performance:
    name: Agents Performance
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workflow execution benchmarks
        run: |
          cd apps/agents
          pnpm test -- --grep="benchmark" 2>&1 || {
            echo "::notice::No benchmark tests matched — skipping"
          }

      - name: Generate agents performance summary
        if: always()
        run: |
          {
            echo "## Agents Performance Report"
            echo ""
            echo "### Workflow Metrics"
            echo "- Workflow load time"
            echo "- Agent initialization time"
            echo "- Tool execution latency"
            echo "- Orchestration overhead"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Bundle size analysis (web app)
  # ---------------------------------------------------------------------------
  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and analyze bundle
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          ANALYZE: true

      - name: Analyze bundle size
        run: |
          cd apps/web/.next
          {
            echo "## Bundle Size Analysis"
            echo ""
            echo "### Build Output"
            echo '```'
            du -sh ./* 2>/dev/null | sort -hr | head -20 || echo "No build output found"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
