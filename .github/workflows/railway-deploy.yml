# Railway Deployment Workflow
#
# Deploys apps/engine and apps/agents to Railway ONLY after CI passes on main.
# Uses workflow_run to gate on CI success — broken code never reaches production.
#
# Key improvements over the previous version:
#   1. Gated on CI success (was: independent trigger, could deploy broken code)
#   2. Exponential backoff health polling (was: fixed 30s sleep)
#   3. Ordered deploys: engine first, then agents (was: parallel, race condition)
#   4. Unified deployment summary with full smoke test suite

name: Railway Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: railway-deploy-production
  cancel-in-progress: false

env:
  RAILWAY_CLI_VERSION: 3.12.0

jobs:
  # ---------------------------------------------------------------------------
  # Gate: Only proceed if CI passed and relevant files changed
  # ---------------------------------------------------------------------------
  gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
      agents: ${{ steps.filter.outputs.agents }}
      should_deploy: ${{ steps.filter.outputs.engine == 'true' || steps.filter.outputs.agents == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Detect changed services
        id: filter
        run: |
          set -euo pipefail
          # Compare against parent commit to detect which services changed
          ENGINE=$(git diff --name-only HEAD~1 HEAD -- 'apps/engine/' 'packages/shared/' | head -1)
          AGENTS=$(git diff --name-only HEAD~1 HEAD -- 'apps/agents/' 'packages/shared/' | head -1)

          echo "engine=$( [ -n "$ENGINE" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "agents=$( [ -n "$AGENTS" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

          echo "Engine changed: $( [ -n "$ENGINE" ] && echo yes || echo no )"
          echo "Agents changed: $( [ -n "$AGENTS" ] && echo yes || echo no )"

  # ---------------------------------------------------------------------------
  # Deploy Engine (always first — agents depend on it)
  # ---------------------------------------------------------------------------
  deploy-engine:
    name: Deploy Engine
    needs: gate
    if: needs.gate.outputs.engine == 'true'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      status: ${{ steps.health.outputs.status }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate required secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_ENGINE_SERVICE_ID: ${{ secrets.RAILWAY_ENGINE_SERVICE_ID }}
          RAILWAY_ENGINE_URL: ${{ secrets.RAILWAY_ENGINE_URL }}
        run: |
          set -euo pipefail
          required=(RAILWAY_TOKEN RAILWAY_ENGINE_SERVICE_ID RAILWAY_ENGINE_URL)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required production secret: $key"
              exit 1
            fi
          done

      - name: Install Railway CLI
        run: npm install -g "@railway/cli@${RAILWAY_CLI_VERSION}"

      - name: Deploy engine service
        working-directory: apps/engine
        run: |
          railway up \
            --service "${{ secrets.RAILWAY_ENGINE_SERVICE_ID }}" \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check with exponential backoff
        id: health
        env:
          ENGINE_URL: ${{ secrets.RAILWAY_ENGINE_URL }}
        run: |
          set -euo pipefail
          echo "Polling engine health at ${ENGINE_URL}/health ..."
          DELAYS=(10 15 20 30 45 60)
          for i in "${!DELAYS[@]}"; do
            attempt=$((i + 1))
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${ENGINE_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "::notice::Engine is healthy (attempt $attempt)"
              echo "status=healthy" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $attempt — HTTP $STATUS, retrying in ${DELAYS[$i]}s..."
            sleep "${DELAYS[$i]}"
          done
          echo "::error::Engine health check failed after ${#DELAYS[@]} attempts"
          echo "status=unhealthy" >> "$GITHUB_OUTPUT"
          exit 1

  # ---------------------------------------------------------------------------
  # Deploy Agents (after engine is confirmed healthy)
  # ---------------------------------------------------------------------------
  deploy-agents:
    name: Deploy Agents
    needs: [gate, deploy-engine]
    # Deploy agents if:
    #   - agents code changed, OR
    #   - engine was deployed (agents may need to reconnect)
    # But only if engine deploy succeeded (or was skipped because unchanged)
    if: |
      always() &&
      (needs.gate.outputs.agents == 'true' || needs.gate.outputs.engine == 'true') &&
      (needs.deploy-engine.result == 'success' || needs.deploy-engine.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    outputs:
      status: ${{ steps.health.outputs.status }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate required secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_AGENTS_SERVICE_ID: ${{ secrets.RAILWAY_AGENTS_SERVICE_ID }}
          RAILWAY_AGENTS_URL: ${{ secrets.RAILWAY_AGENTS_URL }}
        run: |
          set -euo pipefail
          required=(RAILWAY_TOKEN RAILWAY_AGENTS_SERVICE_ID RAILWAY_AGENTS_URL)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required production secret: $key"
              exit 1
            fi
          done

      - name: Install Railway CLI
        run: npm install -g "@railway/cli@${RAILWAY_CLI_VERSION}"

      - name: Deploy agents service
        run: |
          railway up \
            --service "${{ secrets.RAILWAY_AGENTS_SERVICE_ID }}" \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check with exponential backoff
        id: health
        env:
          AGENTS_URL: ${{ secrets.RAILWAY_AGENTS_URL }}
        run: |
          set -euo pipefail
          echo "Polling agents health at ${AGENTS_URL}/health ..."
          DELAYS=(10 15 20 30 45 60)
          for i in "${!DELAYS[@]}"; do
            attempt=$((i + 1))
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${AGENTS_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "::notice::Agents service is healthy (attempt $attempt)"
              echo "status=healthy" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $attempt — HTTP $STATUS, retrying in ${DELAYS[$i]}s..."
            sleep "${DELAYS[$i]}"
          done
          echo "::error::Agents health check failed after ${#DELAYS[@]} attempts"
          echo "status=unhealthy" >> "$GITHUB_OUTPUT"
          exit 1

  # ---------------------------------------------------------------------------
  # End-to-end verification: proxy probes + smoke tests
  # ---------------------------------------------------------------------------
  verify-deployment:
    name: Verify Deployment
    needs: [gate, deploy-engine, deploy-agents]
    if: always() && needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify upstream deploys succeeded
        run: |
          set -euo pipefail
          ENGINE="${{ needs.deploy-engine.result }}"
          AGENTS="${{ needs.deploy-agents.result }}"
          echo "Engine deploy: $ENGINE"
          echo "Agents deploy: $AGENTS"
          if [ "$ENGINE" = "failure" ] || [ "$AGENTS" = "failure" ]; then
            echo "::error::Upstream Railway deploy failed; skipping verification."
            exit 1
          fi

      - name: Validate production URL secret
        env:
          VERCEL_PRODUCTION_URL: ${{ secrets.VERCEL_PRODUCTION_URL }}
        run: |
          if [ -z "${VERCEL_PRODUCTION_URL:-}" ]; then
            echo "::error::Missing required secret: VERCEL_PRODUCTION_URL"
            exit 1
          fi

      - name: Run proxy health probes
        env:
          BASE_URL: ${{ secrets.VERCEL_PRODUCTION_URL }}
        run: |
          set -euo pipefail
          base="${BASE_URL%/}"
          endpoints=(
            "/api/engine/health"
            "/api/agents/health"
            "/api/agents/status"
            "/api/settings/status"
          )

          for endpoint in "${endpoints[@]}"; do
            url="${base}${endpoint}"
            echo "Probing ${url}"
            status=$(curl -sS -o /tmp/proxy-response.json -w "%{http_code}" --max-time 15 "$url")
            if [ "$status" != "200" ]; then
              echo "::error::${endpoint} returned HTTP ${status}"
              cat /tmp/proxy-response.json
              exit 1
            fi
            echo "  -> HTTP 200 OK"
          done

      - name: Run smoke tests
        env:
          VERCEL_URL: ${{ secrets.VERCEL_PRODUCTION_URL }}
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh --verbose

      - name: Write deployment summary
        if: always()
        env:
          ENGINE_RESULT: ${{ needs.deploy-engine.result }}
          AGENTS_RESULT: ${{ needs.deploy-agents.result }}
        run: |
          {
            echo "## Deployment Summary"
            echo ""
            echo "| Service | Status |"
            echo "|---------|--------|"

            if [ "$ENGINE_RESULT" = "success" ]; then
              echo "| Engine  | :white_check_mark: Deployed & Healthy |"
            elif [ "$ENGINE_RESULT" = "skipped" ]; then
              echo "| Engine  | :fast_forward: Skipped (no changes) |"
            else
              echo "| Engine  | :x: $ENGINE_RESULT |"
            fi

            if [ "$AGENTS_RESULT" = "success" ]; then
              echo "| Agents  | :white_check_mark: Deployed & Healthy |"
            elif [ "$AGENTS_RESULT" = "skipped" ]; then
              echo "| Agents  | :fast_forward: Skipped (no changes) |"
            else
              echo "| Agents  | :x: $AGENTS_RESULT |"
            fi

            echo ""
            echo "**Commit:** \`${{ github.event.workflow_run.head_sha }}\`"
            echo "**CI Run:** [#${{ github.event.workflow_run.run_number }}](${{ github.event.workflow_run.html_url }})"
          } >> "$GITHUB_STEP_SUMMARY"
