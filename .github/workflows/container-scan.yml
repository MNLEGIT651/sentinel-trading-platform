name: 'Container Security Scan'

on:
  push:
    branches: [main]
    paths:
      - 'apps/engine/Dockerfile'
      - 'apps/agents/Dockerfile'
  pull_request:
    paths:
      - 'apps/engine/Dockerfile'
      - 'apps/agents/Dockerfile'
  schedule:
    - cron: '0 6 * * 1' # Monday 6am UTC

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: Trivy Scan (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: engine
            dockerfile: apps/engine/Dockerfile
            context: apps/engine
            image: sentinel-engine:${{ github.sha }}
          - service: agents
            dockerfile: apps/agents/Dockerfile
            context: apps/agents
            image: sentinel-agents:${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.image }} -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'
