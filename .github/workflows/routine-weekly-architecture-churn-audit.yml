name: Routine — Weekly Architecture and Churn Audit

# Paired with Claude Code routine: weekly-architecture-churn-audit
# Manifest: .claude/routines/manifest.yaml
# Spec:     .claude/routines/weekly-architecture-churn-audit.md
#
# Gathers churn, file size, and CI signals for the native Claude routine
# to consume. Also emits a compact workflow summary for in-repo visibility.

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      window_days:
        description: 'Window in days (default 7)'
        required: false
        default: '7'
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: read

concurrency:
  group: routine-weekly-architecture-churn-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Collect weekly architecture and churn signals
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify manifest sync
        run: node scripts/routines/verify-routine-sync.mjs --only weekly-architecture-churn-audit

      - name: Derive window
        id: window
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DAYS="${{ inputs.window_days }}"
          else
            DAYS="7"
          fi
          DAYS="${DAYS:-7}"
          ISO_WEEK="$(date -u +%G-W%V)"
          echo "days=${DAYS}" >> "$GITHUB_OUTPUT"
          echo "iso_week=${ISO_WEEK}" >> "$GITHUB_OUTPUT"

      - name: Collect churn (last N days)
        env:
          DAYS: ${{ steps.window.outputs.days }}
        run: |
          mkdir -p reports/routines
          git log --since="${DAYS} days ago" --name-only --pretty=format: \
            | grep -v '^$' \
            | sort \
            | uniq -c \
            | sort -rn \
            > reports/routines/churn-last-week.txt || true

      - name: Collect file sizes (top 30 source files)
        run: |
          mkdir -p reports/routines
          find \
            apps/web/src \
            apps/agents/src \
            apps/engine/src \
            packages/shared/src \
            -type f \
            \( -name '*.ts' -o -name '*.tsx' -o -name '*.py' \) \
            -exec wc -l {} + 2>/dev/null \
            | sort -rn \
            | head -30 \
            > reports/routines/file-sizes.txt || true

      - name: Collect files that grew significantly (>50 lines) this window
        env:
          DAYS: ${{ steps.window.outputs.days }}
        run: |
          BASE="$(git log --since="${DAYS} days ago" --format='%H' | tail -1)"
          if [ -z "${BASE}" ]; then
            echo "No commits in window" > reports/routines/large-file-growth.txt
            exit 0
          fi
          git diff --numstat "${BASE}..HEAD" \
            | awk '{ if ($1 != "-" && $1 > 50) print $1" lines added  "$3 }' \
            | sort -rn \
            > reports/routines/large-file-growth.txt || true

      - name: Collect recent PR history
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr list --repo "${{ github.repository }}" --state all --limit 30 \
            --json number,title,author,createdAt,mergedAt,closedAt,labels,reviewDecision \
            > reports/routines/recent-pr-history.json || echo '[]' > reports/routines/recent-pr-history.json

      - name: Collect CI flakiness signals
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --repo "${{ github.repository }}" --workflow ci.yml --limit 20 \
            --json status,conclusion,createdAt,headBranch,headSha,event \
            > reports/routines/ci-flakiness.json || echo '[]' > reports/routines/ci-flakiness.json

      - name: Emit workflow summary
        env:
          ISO_WEEK: ${{ steps.window.outputs.iso_week }}
          DAYS: ${{ steps.window.outputs.days }}
        run: |
          {
            echo "## [arch] Weekly Architecture & Churn Audit — ${ISO_WEEK}"
            echo ""
            echo "_Window: ${DAYS} days. Generated by the paired workflow. Native Claude routine posts the narrative report._"
            echo ""
            echo "### Top 10 churn files"
            echo '```'
            head -10 reports/routines/churn-last-week.txt || true
            echo '```'
            echo ""
            echo "### Top 10 files by line count"
            echo '```'
            head -10 reports/routines/file-sizes.txt || true
            echo '```'
            echo ""
            echo "### Files that grew > 50 lines this window"
            echo '```'
            head -20 reports/routines/large-file-growth.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit artifact bundle
        uses: actions/upload-artifact@89ef406dd8d7e03cfd12d9e0a4a378f454709029 # v5.0.0
        with:
          name: weekly-arch-audit-${{ github.run_id }}
          path: reports/routines/
          retention-days: 30
