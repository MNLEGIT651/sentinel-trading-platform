name: Control Plane Nightly

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: control-plane-nightly-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  governance-sweep:
    name: Governance Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - name: Verify required workflow inventory
        run: node scripts/check-required-workflows.mjs

      - name: Audit repository settings and branch rules
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/repo-setup-audit.sh --verbose

  node-sweep:
    name: Node Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run node workspace lint
        run: pnpm lint

      - name: Run node workspace tests
        run: pnpm test

      - name: Build node workspaces
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder-publishable-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          NEXT_TELEMETRY_DISABLED: '1'

  engine-sweep:
    name: Engine Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: '.python-version'

      - name: Cache uv / pip
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-${{ runner.os }}-py3.12-${{ hashFiles('apps/engine/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py3.12-

      - name: Install uv
        run: pip install uv==0.11.5

      - name: Create venv and install engine dependencies
        working-directory: apps/engine
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Run engine lint
        working-directory: apps/engine
        run: .venv/bin/python -m ruff check src tests

      - name: Run engine format check
        working-directory: apps/engine
        run: .venv/bin/python -m ruff format --check src tests

      - name: Run engine tests
        working-directory: apps/engine
        run: .venv/bin/python -m pytest tests --tb=short

  security-sweep:
    name: Security Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          package-manager-cache: false

      - name: Enable corepack and install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: '.python-version'

      - name: Install uv
        run: pip install uv==0.11.5

      - name: Create venv and install audit dependencies
        working-directory: apps/engine
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev]"
          uv pip install --python .venv/bin/python pip-audit

      - name: Run repository security audit
        run: node scripts/security-audit.mjs

  sync-nightly-issue:
    name: Sync Nightly Issue
    needs: [governance-sweep, node-sweep, engine-sweep, security-sweep]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      issues: write
    steps:
      - name: Create, update, or close nightly issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = JSON.parse(process.env.NEEDS_JSON);
            const failures = Object.entries(results)
              .filter(([, value]) => value.result !== 'success')
              .map(([name, value]) => `${name}: ${value.result}`);
            const runUrl = `${context.payload.repository.html_url}/actions/runs/${context.runId}`;
            const marker = '<!-- control-plane-nightly -->';
            const title = '🔴 Control plane nightly failed on `main`';
            const labelNames = ['automation/nightly-failure', 'automated'];

            for (const label of labelNames) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: label === 'automation/nightly-failure' ? 'B60205' : '0E8A16',
                  description:
                    label === 'automation/nightly-failure'
                      ? 'Automated issue for nightly engineering control-plane failures'
                      : 'Created by an automated workflow',
                });
              }
            }

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: labelNames.join(','),
              per_page: 100,
            });
            const existing = openIssues.find((issue) => issue.body?.includes(marker));

            if (failures.length > 0) {
              const body = [
                marker,
                '## Nightly Control Plane Failure',
                '',
                `- Run: [Control Plane Nightly #${context.runNumber}](${runUrl})`,
                `- Failed jobs: ${failures.join(', ')}`,
                `- Timestamp: ${new Date().toISOString()}`,
                '',
                '### Expected response',
                '',
                '1. Inspect the failed job logs.',
                '2. Fix the underlying control-plane drift or regression.',
                '3. Re-run the nightly workflow or push the fix through CI.',
              ].join('\n');

              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  title,
                  body,
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: `Nightly control plane is still failing. Latest run: [Control Plane Nightly #${context.runNumber}](${runUrl}).`,
                });
                return;
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: labelNames,
              });
              return;
            }

            if (!existing) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Nightly control plane recovered with [Control Plane Nightly #${context.runNumber}](${runUrl}). Closing automatically.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed',
            });
