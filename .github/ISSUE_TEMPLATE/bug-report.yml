name: Bug report
description: Report a defect in the Sentinel Trading Platform
title: 'bug: '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Click on '...'
        3. Observe '...'
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - web
        - engine
        - agents
        - shared
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: 'Browser, OS, Node version, Python version, etc.'
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Screenshots / Logs
      description: Attach any relevant screenshots, console output, or log snippets.
    validations:
      required: false
