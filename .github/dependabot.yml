# Sentinel Trading Platform — Dependabot Configuration
#
# GitHub Pro feature: Dependabot opens PRs for dependency updates
# automatically and groups related updates to reduce noise.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # ── GitHub Actions ─────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'ci'
    labels:
      - dependencies
      - area/ci
    groups:
      github-actions:
        patterns:
          - '*'

  # ── Root npm (devDependencies: turbo, husky, commitlint, etc.) ─────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore'
    labels:
      - dependencies
    groups:
      root-dev:
        patterns:
          - '*'

  # ── Web dashboard (Next.js + React) ───────────────────────────────
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(web)'
    labels:
      - dependencies
      - area/web
    groups:
      next-react:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - '@next/*'
      testing:
        patterns:
          - 'vitest'
          - '@playwright/*'
          - 'playwright'
      lint-format:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'prettier'
          - '@typescript-eslint/*'

  # ── Agents orchestrator (TypeScript) ───────────────────────────────
  - package-ecosystem: npm
    directory: /apps/agents
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(agents)'
    labels:
      - dependencies
      - area/agents

  # ── Shared contracts ───────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /packages/shared
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(shared)'
    labels:
      - dependencies
      - area/shared

  # ── Python quant engine ────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /apps/engine
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(engine)'
    labels:
      - dependencies
      - area/engine
    groups:
      fastapi:
        patterns:
          - 'fastapi'
          - 'uvicorn'
          - 'starlette'
      data-science:
        patterns:
          - 'pandas'
          - 'numpy'
          - 'scipy'
      testing:
        patterns:
          - 'pytest'
          - 'pytest-*'
          - 'ruff'
