# Sentinel Trading Platform — Dependabot Configuration
#
# Weekly, grouped dependency PRs with controlled update scope.
# Major-version bumps are held for manual planning/review.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'ci'
    labels:
      - dependencies
      - area/ci
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore'
    labels:
      - dependencies
    groups:
      root-dev:
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(web)'
    labels:
      - dependencies
      - area/web
    groups:
      next-react:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - '@next/*'
      testing:
        patterns:
          - 'vitest'
          - '@playwright/*'
          - 'playwright'
      lint-format:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'prettier'
          - '@typescript-eslint/*'
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: npm
    directory: /apps/agents
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(agents)'
    labels:
      - dependencies
      - area/agents
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: npm
    directory: /packages/shared
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(shared)'
    labels:
      - dependencies
      - area/shared
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: pip
    directory: /apps/engine
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(engine)'
    labels:
      - dependencies
      - area/engine
    groups:
      fastapi:
        patterns:
          - 'fastapi'
          - 'uvicorn'
          - 'starlette'
      data-science:
        patterns:
          - 'pandas'
          - 'numpy'
          - 'scipy'
      testing:
        patterns:
          - 'pytest'
          - 'pytest-*'
          - 'ruff'
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
