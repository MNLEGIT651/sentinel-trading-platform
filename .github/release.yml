# Auto-generated release notes configuration
# Docs: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  categories:
    - title: '🚀 Features'
      labels:
        - enhancement
        - feat
    - title: '🐛 Bug Fixes'
      labels:
        - bug
        - fix
    - title: '🔒 Security'
      labels:
        - security
    - title: '📦 Dependencies'
      labels:
        - dependencies
    - title: '🏗️ Infrastructure'
      labels:
        - area/ci
        - infrastructure
    - title: '📝 Documentation'
      labels:
        - documentation
    - title: '🧪 Testing'
      labels:
        - testing
    - title: '🔧 Other Changes'
      labels:
        - '*'
  exclude:
    labels:
      - skip-changelog
